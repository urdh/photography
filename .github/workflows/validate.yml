name: "Test & validate"

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build containers
    env:
      DOCKER_CACHE: type=registry,ref=ghcr.io/${{ github.repository }}:cache
      PUSH_CACHE: ${{ github.actor != 'dependabot[bot]' }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: false
          lfs: false
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: ${{ env.DOCKER_CACHE }}
          cache-to: ${{ env.PUSH_CACHE == 'true' && format('{0},mode=max', env.DOCKER_CACHE) || '' }}
          target: builder
