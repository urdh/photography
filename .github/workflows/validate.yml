name: "Test & validate"

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build containers
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: false
          lfs: false
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/site:cache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}/site:cache,mode=max
          target: builder
