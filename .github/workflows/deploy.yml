name: "Deploy to Vercel"

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  PRODUCTION: ${{ github.event_name != 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build containers
    steps:
      - uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/site
          tags: |
            type=ref,event=branch
            type=sha,prefix=git-
        id: meta
      - uses: actions/checkout@v6
        with:
          submodules: false
          lfs: false
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/site:cache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}/site:cache,mode=max
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          target: site

  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Vercel
    needs: build
    steps:
      - uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/site
          tags: type=sha,prefix=git-
        id: meta
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.ACCESS_TOKEN }}
          submodules: true
          lfs: true
      - run: docker run --volume=.:/work --workdir /work ${{ steps.meta.outputs.tags }}
      - uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          vercel-args: --confirm ${{ (env.PRODUCTION == 'true') && '--prod' || '' }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./_site
      - run: curl -s https://google.com/ping\?sitemap=https://photography.sigurdhsson.org/sitemap.xml
        if: ${{ success() && (env.PRODUCTION == 'true') }}

  cleanup:
    name: Delete image from ghcr.io
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs: [build, deploy]
    steps:
      - uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/site
          tags: type=sha,prefix=git-
        id: meta
      - uses: dataaxiom/ghcr-cleanup-action@v1
        with:
          package: photography/site
          delete-tags: ${{ steps.meta.outputs.tag-names }}
          delete-untagged: true
